name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "*.md"
      - "packages/docs/**"
      - "LICENSE"
  merge_group:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "packages/docs/**"
      - "LICENSE"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Job dependency graph:
#
#   check (lint + typecheck + API surface) ─────────────┐
#                                                        │
#           ┌── test (Ubuntu 22, shards 1..3) ──────────┤
#           ├── test (macOS 22, shards 1..3) ───────────┤
#   build ──┼── test (Windows 22, shards 1..3) ─────────┼── status
#           └── test (Ubuntu 24, shards 1..3) ──────────┤
#                                                        │
#   (release-any-commit runs independently)  ───────────┘
#
# build no longer typechecks or verifies the API surface — those moved to the
# check job so they run in parallel instead of extending the build→test path.
# The nadle suite (the slow leg) is split across 3 shards via vitest --shard.

jobs:
  build:
    name: Build
    if: ${{ github.event.pull_request.draft != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup

      - name: Build
        run: nadle build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-output
          path: |
            packages/kernel/lib
            packages/project-resolver/lib
            packages/nadle/lib
            packages/eslint-plugin/lib
            packages/create-nadle/lib
          retention-days: 1

  check:
    name: Lint
    if: ${{ github.event.pull_request.draft != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup

      - name: Restore lint caches
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            node_modules/.cache/eslint
            node_modules/.cache/cspell
          key: lint-cache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            lint-cache-${{ runner.os }}-

      - name: Check
        run: nadle check

      # typecheck + the API-surface tasks both depend on the package build, so
      # run them together — nadle dedupes the shared build within one invocation.
      - name: Typecheck and verify API surface
        run: nadle typecheck packages:nadle:testNoWarningsAndUndocumentedAPI

  test:
    name: Test Node ${{ matrix.node-version }} on ${{ matrix.os }} (shard ${{ matrix.shard }}/3)
    if: ${{ github.event.pull_request.draft != true }}
    needs: [build]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    # bash everywhere: PowerShell strips the bare `--` separator that nadle
    # needs for passthrough args.
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version: ["22"]
        shard: [1, 2, 3]
        include:
          - os: ubuntu-latest
            node-version: "24"
            shard: 1
          - os: ubuntu-latest
            node-version: "24"
            shard: 2
          - os: ubuntu-latest
            node-version: "24"
            shard: 3

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: packages

      # The nadle suite dominates wall-clock, so split it across shards. The small
      # packages run once (on shard 1) instead of redundantly on every shard.
      - name: Test nadle
        run: nadle testUnit -- --project nadle --shard=${{ matrix.shard }}/3

      - name: Test other packages
        if: ${{ matrix.shard == 1 }}
        run: nadle testUnit -- --project kernel --project project-resolver --project eslint-plugin --project create-nadle --project language-server

  status:
    name: CI Status
    needs: [check, build, test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        if: |
          (needs.check.result == 'failure' || needs.check.result == 'cancelled') ||
          (needs.build.result == 'failure' || needs.build.result == 'cancelled') ||
          (needs.test.result == 'failure' || needs.test.result == 'cancelled')
        run: exit 1
