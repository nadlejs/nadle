name: Release

on:
  push:
    tags:
      - "*/v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Parse tag
        id: parse-tag
        # Tag components are npm package names; map the ones whose directory differs.
        run: |
          package="${GITHUB_REF_NAME%%/*}"
          case "$package" in
            eslint-plugin-nadle) package=eslint-plugin ;;
          esac
          echo "package=$package" >> "$GITHUB_OUTPUT"

      - name: Build
        run: nadle build

      - name: Setup Node.js 24 for trusted publishing
        if: ${{ !startsWith(github.ref_name, 'vscode-extension/') }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        if: ${{ !startsWith(github.ref_name, 'vscode-extension/') }}
        # pnpm pack rewrites workspace: protocol deps to real versions;
        # npm publish then handles OIDC trusted publishing + provenance.
        run: |
          pnpm pack --out package.tgz
          npm publish package.tgz --provenance --access public
        working-directory: packages/${{ steps.parse-tag.outputs.package }}

      - name: Publish VS Code Extension
        if: startsWith(github.ref_name, 'vscode-extension/')
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        working-directory: packages/vscode-extension
        run: npx @vscode/vsce publish
